<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="%project.name% - %project.description%" />
		<meta name="theme-color" content="#111" />
		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="%project.name% - %project.description%" />
		<meta property="og:description" content="%project.ogDescription%" />
		<meta property="og:image" content="%project.url%/favicon.svg" />
		<meta property="og:url" content="%project.url%" />
		<meta property="og:site_name" content="%project.name%" />
		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="%project.name% - %project.description%" />
		<meta name="twitter:description" content="%project.ogDescription%" />
		<meta name="twitter:image" content="%project.url%/favicon.svg" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet" />
		<title>%project.name% - %project.description%</title>
		<script>
			// Set <html lang> before render so the browser does not offer translation from English.
			(function () {
				try {
					var saved = localStorage.getItem('language');
					var nav = (navigator.language || '').toLowerCase().split('-')[0];
					var lang = saved || nav || 'en';
					document.documentElement.lang = lang;
				} catch (e) {}
			})();
		</script>
		<!-- Google tag (gtag.js) -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-M8VQDHP58X"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() {
				dataLayer.push(arguments);
			}
			gtag('js', new Date());
			gtag('config', 'G-M8VQDHP58X');
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-prerender="true">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
